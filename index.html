    <script>
        // ===== CANVAS ANIMATED BACKGROUND =====
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let mouseX = 0, mouseY = 0;
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5;
                this.opacity = Math.random() * 0.5 + 0.1;
                this.color = Math.random() > 0.5 ? '#ff006e' : '#8338ec';
            }
            
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                
                const dx = mouseX - this.x;
                const dy = mouseY - this.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                if (distance < 150) {
                    const force = (150 - distance) / 150;
                    this.x -= dx * force * 0.02;
                    this.y -= dy * force * 0.02;
                }
                
                if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
                if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
            }
            
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.opacity;
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }
        
        for (let i = 0; i < 80; i++) {
            particles.push(new Particle());
        }
        
        function connectParticles() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < 120) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(131, 56, 236, ${0.15 * (1 - distance / 120)})`;
                        ctx.lineWidth = 0.5;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
        }
        
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            connectParticles();
            requestAnimationFrame(animate);
        }
        animate();
        
        // ===== MOUSE TRACKING =====
        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            const glow = document.getElementById('cursorGlow');
            glow.style.left = e.clientX + 'px';
            glow.style.top = e.clientY + 'px';
        });
        
        // ===== RIPPLE EFFECT ON CLICK =====
        document.addEventListener('click', (e) => {
            const ripple = document.createElement('div');
            ripple.className = 'ripple';
            ripple.style.left = e.clientX - 25 + 'px';
            ripple.style.top = e.clientY - 25 + 'px';
            ripple.style.width = '50px';
            ripple.style.height = '50px';
            document.body.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
        });
        
        // ===== YOUTUBE API - REAL STATS =====
        const API_KEY = 'AIzaSyBDGBLLWMEGMB9KOmtZPTlPI8QymNPZOjY';
        const CHANNEL_HANDLE = '@VIPGAMER_6';
        
        async function fetchYouTubeStats() {
            try {
                // Step 1: Get Channel ID from handle
                const searchResponse = await fetch(
                    `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${CHANNEL_HANDLE}&type=channel&key=${API_KEY}`
                );
                const searchData = await searchResponse.json();
                
                if (!searchData.items || searchData.items.length === 0) {
                    throw new Error('Channel not found');
                }
                
                const channelId = searchData.items[0].snippet.channelId;
                
                // Step 2: Get channel statistics
                const statsResponse = await fetch(
                    `https://www.googleapis.com/youtube/v3/channels?part=statistics&id=${channelId}&key=${API_KEY}`
                );
                const statsData = await statsResponse.json();
                
                if (!statsData.items || statsData.items.length === 0) {
                    throw new Error('Stats not found');
                }
                
                const stats = statsData.items[0].statistics;
                
                // Update UI with animation
                animateCounter('subscribers', parseInt(stats.subscriberCount));
                animateCounter('videos', parseInt(stats.videoCount));
                animateCounter('views', parseInt(stats.viewCount));
                
            } catch (error) {
                console.error('Error fetching stats:', error);
                document.getElementById('subscribers').textContent = 'غير متاح';
                document.getElementById('videos').textContent = 'غير متاح';
                document.getElementById('views').textContent = 'غير متاح';
                document.getElementById('subscribers').classList.add('stat-error');
                document.getElementById('videos').classList.add('stat-error');
                document.getElementById('views').classList.add('stat-error');
            }
        }
        
        function animateCounter(elementId, target) {
            const element = document.getElementById(elementId);
            element.classList.remove('loading');
            
            const duration = 2000;
            const start = 0;
            const startTime = performance.now();
            
            function update(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                
                // Easing function
                const easeOut = 1 - Math.pow(1 - progress, 3);
                const current = Math.floor(start + (target - start) * easeOut);
                
                element.textContent = formatNumber(current);
                
                if (progress < 1) {
                    requestAnimationFrame(update);
                } else {
                    element.textContent = formatNumber(target);
                }
            }
            
            requestAnimationFrame(update);
        }
        
        function formatNumber(num) {
            if (num >= 1000000) {
                return (num / 1000000).toFixed(1) + 'M+';
            } else if (num >= 1000) {
                return (num / 1000).toFixed(1) + 'K+';
            }
            return num.toString();
        }
        
        // Fetch stats when page loads
        fetchYouTubeStats();
        
        // Refresh stats every 5 minutes
        setInterval(fetchYouTubeStats, 300000);
        
        // ===== TYPING EFFECT =====
        const typingText = document.querySelector('.typing-text');
        const texts = ['مبدع محتوى', 'صانع محتوى', 'يوتيوبر', 'ستريمر', 'مؤثر'];
        let textIndex = 0, charIndex = 0, isDeleting = false;
        
        function typeEffect() {
            const currentText = texts[textIndex];
            if (isDeleting) {
                typingText.textContent = currentText.substring(0, charIndex - 1);
                charIndex--;
            } else {
                typingText.textContent = currentText.substring(0, charIndex + 1);
                charIndex++;
            }
            let typeSpeed = isDeleting ? 50 : 100;
            if (!isDeleting && charIndex === currentText.length) {
                typeSpeed = 2000;
                isDeleting = true;
            } else if (isDeleting && charIndex === 0) {
                isDeleting = false;
                textIndex = (textIndex + 1) % texts.length;
                typeSpeed = 500;
            }
            setTimeout(typeEffect, typeSpeed);
        }
        typeEffect();
    </script>
</body>
</html>
